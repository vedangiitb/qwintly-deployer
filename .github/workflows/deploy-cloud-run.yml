name: Deploy Deployer Job

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  JOB_NAME: qwintly-deployer
  IMAGE_NAME: qwintly-deployer

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_QWINTLY_GIT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_QWINTLY }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars.REGION }}-docker.pkg.dev

      - name: Build Docker Image
        run: |
          IMAGE=${{ vars.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_QWINTLY }}/qwintly-images/${{ env.IMAGE_NAME }}:${{ github.sha }}

          gcloud builds submit \
            --tag $IMAGE \
            .

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy Cloud Run Job
        run: |
          gcloud run jobs deploy $JOB_NAME \
            --image=$IMAGE \
            --region=${{ vars.REGION }} \
            --cpu=1 \
            --memory=512Mi \
            --max-retries=1 \
            --task-timeout=420 \
            --service-account=${{ vars.DEPLOYER_SA_EMAIL }} \
            --set-env-vars="SNAPSHOT_BUCKET=${{ vars.SNAPSHOT_BUCKET }},GCP_PROJECT_ID_QWINTLY=${{ vars.GCP_PROJECT_ID_QWINTLY }},GEN_SITES_PROJECT_ID=${{ vars.GEN_SITES_PROJECT_ID }}" \
            --set-secrets="NEXT_PUBLIC_SUPABASE_URL=supabase-url:latest,SUPABASE_SECRET_KEY=supabase-secret-key:latest,GEMINI_API_KEY=gemini-api-key:latest"
